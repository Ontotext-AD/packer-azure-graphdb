name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  PACKER_VERSION: "1.9.4"

jobs:
  analyze:
    name: Analyze the Packer scripts
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Packer CLI
        uses: hashicorp/setup-packer@c3d53c525d422944e50ee27b840746d6522b08de # v3.2.0
        with:
          version: "${{ env.PACKER_VERSION }}"

      - name: Run Packer init
        run: packer init .

      - name: Run Packer format check
        run: packer fmt -check -recursive .

      - name: Run Packer validate check
        run: packer validate -syntax-only .
